name: Build Windows exe

# Trigger manually from the Actions tab ("Run workflow"), or automatically
# whenever these files change.
on:
  workflow_dispatch:
  push:
    paths:
      - "lao_pdf_ocr.py"
      - "lao_pdf_ocr_gui.py"
      - "tessdata/**"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tesseract OCR
        run: choco install --no-progress -y tesseract

      - name: Download Poppler for Windows (pinned release, not via choco — more reliable path)
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v26.02.0-0/Release-26.02.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler_extracted

          $pdftoppm = Get-ChildItem poppler_extracted -Recurse -Filter "pdftoppm.exe" |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $pdftoppm) { throw "Could not find pdftoppm.exe inside the downloaded poppler zip" }
          $popplerDir = Split-Path $pdftoppm
          Write-Host "Poppler bin dir: $popplerDir"
          Copy-Item -Recurse -Force $popplerDir poppler_bin

      - name: Refresh PATH and locate installed Tesseract, stage for bundling
        shell: pwsh
        run: |
          # Chocolatey updates the machine's PATH in the registry, but this
          # runner's shell process was already started and won't see that
          # change until refreshed — refreshenv re-reads it into the current
          # session. Belt-and-braces: also fall back to the well-known
          # default install location if Get-Command still can't find it.
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

          $tess = (Get-Command tesseract.exe -ErrorAction SilentlyContinue).Source
          if (-not $tess) {
            $tess = "C:\Program Files\Tesseract-OCR\tesseract.exe"
          }
          if (-not (Test-Path $tess)) { throw "Could not locate tesseract.exe after install" }
          $tessDir = Split-Path $tess
          Write-Host "Tesseract dir: $tessDir"
          Copy-Item -Recurse -Force $tessDir tesseract_bundle

      - name: Sanity-check bundled tesseract has the Lao model only from our repo (not choco's)
        shell: pwsh
        run: |
          # We ship our own known-good tessdata/ (tessdata_best, orthography-
          # tested) — remove any tessdata choco installed alongside tesseract
          # so there's no ambiguity about which model gets used at runtime.
          Remove-Item -Recurse -Force "tesseract_bundle\tessdata" -ErrorAction SilentlyContinue

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pytesseract pdf2image pypdf pillow

      - name: Build the exe
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name LaoPdfOcr `
            --add-data "tessdata;tessdata" `
            --add-data "tesseract_bundle;tesseract" `
            --add-data "poppler_bin;poppler_bin" `
            lao_pdf_ocr_gui.py

      - name: Smoke-test the built exe against the sample PDF
        shell: pwsh
        run: |
          Copy-Item test_lao_scanned.pdf dist\test_lao_scanned.pdf
          # Run the extraction path headlessly via the bundled Python modules
          # directly (not the GUI) so CI can assert on the output text
          # without needing to drive the Tk window.
          $env:PYTHONPATH = "."
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from lao_pdf_ocr import extract_text
          os.environ['TESSDATA_PREFIX'] = 'tessdata'
          text = extract_text(
              'test_lao_scanned.pdf',
              poppler_path=os.path.abspath('poppler_bin'),
          )[0]
          print('OCR result:', repr(text))
          assert 'ສະບາຍດີ' in text, f'Lao OCR sanity check failed: {text!r}'
          print('Sanity check passed.')
          "

      - name: Upload the exe as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaoPdfOcr-windows
          path: dist/LaoPdfOcr.exe
          retention-days: 90
