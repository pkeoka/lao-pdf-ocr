name: Build Windows exe

# Trigger manually from the Actions tab ("Run workflow"), or automatically
# whenever these files change.
on:
  workflow_dispatch:
  push:
    paths:
      - "lao_pdf_ocr.py"
      - "lao_pdf_ocr_gui.py"
      - "tessdata/**"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tesseract OCR
        run: choco install --no-progress -y tesseract

      - name: Download Poppler for Windows (pinned release, not via choco — more reliable path)
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v26.02.0-0/Release-26.02.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip
          Expand-Archive -Path poppler.zip -DestinationPath poppler_extracted

          $pdftoppm = Get-ChildItem poppler_extracted -Recurse -Filter "pdftoppm.exe" |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $pdftoppm) { throw "Could not find pdftoppm.exe inside the downloaded poppler zip" }
          $popplerDir = Split-Path $pdftoppm
          Write-Host "Poppler bin dir: $popplerDir"
          Copy-Item -Recurse -Force $popplerDir poppler_bin

      - name: Refresh PATH and locate installed Tesseract, stage for bundling
        shell: pwsh
        run: |
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

          $tess = (Get-Command tesseract.exe -ErrorAction SilentlyContinue).Source
          if (-not $tess) {
            $tess = "C:\Program Files\Tesseract-OCR\tesseract.exe"
